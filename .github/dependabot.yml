version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 5
    groups:
      npm-production:
        dependency-type: production
        patterns:
          - "*"
      npm-development:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 3
