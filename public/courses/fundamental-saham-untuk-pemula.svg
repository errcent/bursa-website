<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" role="img" aria-label="Fundamental Saham untuk Pemula">
  <defs>
    <linearGradient id="bg-fundamental-saham-untuk-pemula" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b3d2e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <radialGradient id="glow-fundamental-saham-untuk-pemula" cx="22%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="area-fundamental-saham-untuk-pemula" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg-fundamental-saham-untuk-pemula)"/>
  <rect width="640" height="400" fill="url(#glow-fundamental-saham-untuk-pemula)"/>
  <g opacity="0.12" stroke="#6ee7b7" stroke-width="1">
    <line x1="0" y1="80" x2="640" y2="80"/>
    <line x1="0" y1="160" x2="640" y2="160"/>
    <line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="320" x2="640" y2="320"/>
  </g>
  <!-- Simple ascending fundamentals curve with area fill -->
  <path d="M -20 300 L 100 280 L 220 300 L 340 220 L 460 240 L 580 130 L 680 150 L 680 400 L -20 400 Z"
        fill="url(#area-fundamental-saham-untuk-pemula)"/>
  <path d="M -20 300 L 100 280 L 220 300 L 340 220 L 460 240 L 580 130 L 680 150"
        fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <g fill="#6ee7b7">
    <circle cx="220" cy="300" r="5" opacity="0.85"/>
    <circle cx="340" cy="220" r="5" opacity="0.85"/>
    <circle cx="580" cy="130" r="5" opacity="0.85"/>
  </g>
  <circle cx="560" cy="70" r="70" fill="#34d399" fill-opacity="0.08"/>
</svg>
