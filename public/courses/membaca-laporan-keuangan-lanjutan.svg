<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" role="img" aria-label="Analisis Valuasi Lanjutan">
  <defs>
    <linearGradient id="bg-membaca-laporan-keuangan-lanjutan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b3d2e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <radialGradient id="glow-membaca-laporan-keuangan-lanjutan" cx="22%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg-membaca-laporan-keuangan-lanjutan)"/>
  <rect width="640" height="400" fill="url(#glow-membaca-laporan-keuangan-lanjutan)"/>
  <g opacity="0.12" stroke="#6ee7b7" stroke-width="1">
    <line x1="0" y1="80" x2="640" y2="80"/>
    <line x1="0" y1="160" x2="640" y2="160"/>
    <line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="320" x2="640" y2="320"/>
  </g>
  <!-- Ascending valuation bars -->
  <g fill="#34d399">
    <rect x="360" y="260" width="34" height="70" rx="3" opacity="0.5"/>
    <rect x="410" y="220" width="34" height="110" rx="3" opacity="0.65"/>
    <rect x="460" y="175" width="34" height="155" rx="3" opacity="0.8"/>
    <rect x="510" y="120" width="34" height="210" rx="3" opacity="0.95"/>
  </g>
  <!-- DCF discount curve -->
  <path d="M 80 150 C 160 140, 220 190, 300 175 S 420 130, 520 100"
        fill="none" stroke="#6ee7b7" stroke-width="3" stroke-linecap="round" opacity="0.7" stroke-dasharray="1 0"/>
  <g fill="#6ee7b7">
    <circle cx="80" cy="150" r="5" opacity="0.9"/>
    <circle cx="300" cy="175" r="5" opacity="0.9"/>
    <circle cx="520" cy="100" r="5" opacity="0.9"/>
  </g>
  <circle cx="90" cy="320" r="90" fill="#34d399" fill-opacity="0.06"/>
</svg>
